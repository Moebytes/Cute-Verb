name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{matrix.os}}

    env:
      PLUGIN_NAME: CuteVerb

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup macOS code signing
        if: runner.os == 'macOS'
        run: |
          echo "${{secrets.CSC_KEY}}" | base64 --decode > ~/app_cert.p12

          security create-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p actions build.keychain
          security default-keychain -s build.keychain

          security import ~/app_cert.p12 \
            -k build.keychain -f pkcs12 \
            -P "${{secrets.CSC_KEY_PASSWORD}}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k actions build.keychain

          security list-keychains -d user -s build.keychain login.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install WebView2 (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Register-PackageSource -ProviderName NuGet -Name nugetRepository -Location https://www.nuget.org/api/v2
          Install-Package Microsoft.Web.WebView2 -Scope CurrentUser -RequiredVersion 1.0.1901.177 -Source nugetRepository -Force

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs "ADD_CMAKE_TO_PATH=1" --yes

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential pkg-config \
            libasound2-dev libx11-dev libxrandr-dev libxext-dev \
            libfreetype6-dev libfontconfig1-dev libgl1-mesa-dev \
            libcurl4-openssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev
            
      - name: Install npm packages
        run: npm install

      - name: Build project
        run: npm run build

      - name: Remove shared static libraries
        shell: bash
        run: |
          RELEASE_DIR="build/${{env.PLUGIN_NAME}}_artefacts/Release"
          find "$RELEASE_DIR" -type f -name "*.a" -print -delete || true
          find "$RELEASE_DIR" -type f -name "*.lib" -print -delete || true
          find "$RELEASE_DIR" -type f -name "*.exp" -print -delete || true

      - name: Flatten plugin folders
        shell: bash
        run: |
          RELEASE_DIR="build/${{env.PLUGIN_NAME}}_artefacts/Release"
          for subdir in "AU" "VST3" "Standalone"; do
            if [ -d "$RELEASE_DIR/$subdir" ]; then
              mv "$RELEASE_DIR/$subdir"/* "$RELEASE_DIR"/ 2>/dev/null || true
            fi
          done
          rmdir "$RELEASE_DIR/AU" 2>/dev/null || true
          rmdir "$RELEASE_DIR/VST3" 2>/dev/null || true
          rmdir "$RELEASE_DIR/Standalone" 2>/dev/null || true

      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          RELEASE_DIR="build/${{env.PLUGIN_NAME}}_artefacts/Release"
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | head -n1 | sed -E 's/.*"(.+)"/\1/')

          find "$RELEASE_DIR" \
            \( -name "*.vst3" -o -name "*.component" -o -name "*.app" \) \
            -print0 | while IFS= read -r -d '' bundle; do

            echo "Signing: $bundle"

            codesign --force --deep --timestamp --options runtime \
              --sign "$IDENTITY" "$bundle"
          done

          find "$RELEASE_DIR" \
            \( -name "*.vst3" -o -name "*.component" -o -name "*.app" \) \
            -exec codesign --verify --deep --strict --verbose {} \;

      - name: Notarize macOS binaries
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.private_keys

          cat > ~/.private_keys/AuthKey_${{secrets.APPLE_API_KEY_ID}}.p8 <<EOF
          ${{secrets.APPLE_API_PRIVATE_KEY}}
          EOF

          RELEASE_DIR="build/${{env.PLUGIN_NAME}}_artefacts/Release"

          mkdir notarize

          cp -R "$RELEASE_DIR"/*.app notarize/ 2>/dev/null || true
          cp -R "$RELEASE_DIR"/*.vst3 notarize/ 2>/dev/null || true
          cp -R "$RELEASE_DIR"/*.component notarize/ 2>/dev/null || true

          ditto -c -k --keepParent notarize notarize.zip

          xcrun notarytool submit \
            notarize.zip \
            --key ~/.private_keys/AuthKey_${{secrets.APPLE_API_KEY_ID}}.p8 \
            --key-id "${{secrets.APPLE_API_KEY_ID}}" \
            --issuer "${{secrets.APPLE_API_ISSUER_ID}}" \
            --wait

          find "$RELEASE_DIR" \
            \( -name "*.app" -o -name "*.vst3" -o -name "*.component" \) \
            -print0 | while IFS= read -r -d '' item; do

            echo "Stapling $item"
            xcrun stapler staple "$item"
          done

          find "$RELEASE_DIR" \
            \( -name "*.app" -o -name "*.vst3" -o -name "*.component" \) \
            -exec spctl -a -vv {} \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.PLUGIN_NAME}}-${{matrix.os}}
          path: build/${{env.PLUGIN_NAME}}_artefacts/Release